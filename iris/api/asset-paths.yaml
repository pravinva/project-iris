  /unity-catalog/asset-types:
    get:
      summary: List asset types
      description: Gets an array of asset types in the given parent catalog and schema.
      operationId: list-asset-types
      parameters:
        - name: catalog_name
          in: query
          description: The name of the catalog
          required: true
          schema:
            type: string
        - name: schema_name
          in: query
          description: The name of the schema
          required: true
          schema:
            type: string
        - name: max_results
          in: query
          description: Maximum number of asset types to return
          schema:
            type: integer
            format: int32
        - name: page_token
          in: query
          description: Opaque pagination token to go to next page
          schema:
            type: string
      responses:
        '200':
          description: The asset types list was successfully retrieved
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AssetTypeList'
      tags:
