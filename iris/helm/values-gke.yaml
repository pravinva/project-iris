server:
  image:
    repository: us-central1-docker.pkg.dev/gcp-sandbox-field-eng/iris-artifacts/iris-uc-server
    tag: latest
    pullPolicy: Always

  service:
    type: LoadBalancer
    port: 8080

  resources:
    requests:
      memory: "2Gi"
      cpu: "1000m"
    limits:
      memory: "4Gi"
      cpu: "2000m"

storage:
  modelStorageRoot: file:/tmp/ucroot

auth:
  enabled: false
